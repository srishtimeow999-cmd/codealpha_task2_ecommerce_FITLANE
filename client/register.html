<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FITLANE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-container">
        <div class="logo">
          <h1>🛍️ FITLANE</h1>
        </div>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="products.html" class="nav-link">Products</a></li>
          <li><a href="cart.html" class="nav-link">Cart <span id="cartBadge" class="badge">0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container section-padding auth-container">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-subtitle">Join us to start shopping</p>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            required 
            placeholder="Enter your full name"
            class="input-field"
          >
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="Enter your email"
            class="input-field"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            placeholder="Create a password (min 6 chars)"
            class="input-field"
          >
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            required 
            placeholder="Confirm your password"
            class="input-field"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="registerBtn">
          Create Account
        </button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/register.js"></script>
</body>
</html>

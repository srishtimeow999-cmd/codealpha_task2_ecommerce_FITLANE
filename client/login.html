<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FITLANE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-container">
        <div class="logo">
          <h1>🛍️ FITLANE</h1>
        </div>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="products.html" class="nav-link">Products</a></li>
          <li><a href="cart.html" class="nav-link">Cart <span id="cartBadge" class="badge">0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container section-padding auth-container">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Login to your account</p>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="Enter your email"
            class="input-field"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            placeholder="Enter your password"
            class="input-field"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
          Login
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </p>

      <!-- Demo Credentials -->
      <div class="demo-info">
        <p><strong>Demo Admin Account:</strong></p>
        <p>Email: admin@ecommerce.com</p>
        <p>Password: admin123</p>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script>
   if (window.location.protocol === 'file:') {
  window.location.href = '/login.html';
}
  </script>
  <script src="js/api.js?v=99"></script>
  <script src="js/auth.js?v=99"></script>
  <script src="js/login.js?v=99"></script>
</body>
</html>
